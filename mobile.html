<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#eef6ff" />
    <title>LOF基金溢价率</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./mobile.css" />
  </head>
  <body>
    <main class="phone-shell">
      <header class="hero">
        <div class="brand">
          <div class="avatar">毛</div>
          <div>
            <h1>LOF基金溢价率</h1>
            <p>手机实时监控 · 阈值提醒</p>
          </div>
        </div>
        <button id="refreshBtn" class="primary" type="button">刷新</button>
      </header>

      <section class="status-grid" aria-label="顶部状态">
        <article>
          <span>基金总数</span>
          <strong id="totalCount" class="red">--</strong>
        </article>
        <article>
          <span>系统状态</span>
          <strong id="statusText">待刷新</strong>
        </article>
        <article>
          <span>估值变动</span>
          <strong id="estimateChange" class="amber">--</strong>
        </article>
        <article>
          <span>最近刷新</span>
          <strong id="updatedAt" class="time">--</strong>
        </article>
      </section>

      <section class="tools" aria-label="搜索和提醒">
        <label class="search">
          <span>⌕</span>
          <input id="searchInput" type="search" placeholder="代码/名称" />
        </label>
        <button id="alertToggle" class="secondary" type="button">提醒开</button>
      </section>

      <section class="reminder">
        <div>
          <strong>提醒阈值</strong>
          <p>页面打开时自动刷新，达到阈值会震动并弹出通知。</p>
        </div>
        <label>
          <input id="thresholdInput" type="number" min="0" step="0.1" value="3" />
          <span>%</span>
        </label>
      </section>

      <nav id="tabs" class="tabs" aria-label="基金分类"></nav>

      <div class="summary">
        <span id="summaryText">筛选：溢价 >= 3%</span>
        <span id="visibleCount">共 0 条</span>
      </div>

      <p id="errorBox" class="error" hidden></p>
      <p id="dataNotice" class="notice" hidden></p>

      <section class="list-panel">
        <div class="table-head">
          <span>基金</span>
          <span>实时净值<br />成交额</span>
          <span>收盘价<br />涨幅</span>
          <span>实时溢价率<br />T-1溢价/日期</span>
        </div>
        <div id="fundList" class="fund-list"></div>
        <p id="emptyState" class="empty" hidden>没有符合条件的基金。</p>
      </section>

      <footer>
        <p>数据来源：HaoETF 公开页面，经后端接口转发。</p>
        <p>提醒说明：仅在此页面打开时震动或弹窗，关闭页面后不会后台提醒。</p>
        <p>数据仅作跟踪参考，不构成投资建议。</p>
      </footer>
    </main>

    <script src="./mobile-config.js"></script>
    <script src="./miniprogram/utils/fund-core.js?v=20260711-data-reliability"></script>
    <script src="./client-runtime.js?v=20260711-data-reliability"></script>
    <script src="./mobile-data.js?v=20260711-data-reliability"></script>
    <script src="./mobile.js?v=20260711-data-reliability"></script>
  </body>
</html>
